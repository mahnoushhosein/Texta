<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#075E54" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Log in — Texta</title>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary-app px-3">
    <a href="index.html" class="navbar-brand">Texta</a>
  </nav>

  <div class="auth-card card shadow p-4 mx-3">
    <h4 class="fw-bold text-center mb-4" style="color:var(--primary)">Log in to Texta</h4>
    <form id="login-form">
      <div class="mb-3">
        <input id="identifier" type="text" class="form-control" placeholder="Username or email" required autocomplete="username" />
      </div>
      <div class="mb-3">
        <input id="password" type="password" class="form-control" placeholder="Password" required autocomplete="current-password" />
      </div>
      <p id="error" class="text-danger small mb-2"></p>
      <button id="submit-btn" type="submit" class="btn w-100 text-white fw-semibold" style="background:var(--primary)">
        Log in
      </button>
    </form>
    <p class="text-center text-muted small mt-3">
      Don't have an account? <a href="register.html" style="color:var(--primary)">Sign up</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
