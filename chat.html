<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#075E54" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Chats — Texta</title>
</head>
<body>

  <nav class="navbar navbar-dark bg-primary-app px-3">
    <a href="chat.html" class="navbar-brand fw-bold">Texta</a>
    <div class="d-flex gap-3" align-items-center>
      <a href="profile.html" class="text-white text-decoration-none small">Profile</a>
      <button id="signout-btn" class="btn btn-sm btn-outline-light">Sign out</button>
    </div>
  </nav>

  <div class="chat-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="fw-semibold">Messages</span>
        <small class="text-muted">Your Conversations</small>
        <button class="btn-new" data-bs-toggle="modal" data-bs-target="#newChatModal" title="New message">+</button>
      </div>
      <div id="conversation-list"></div>
    <!--Example of conversation item-->
    <div class="conversation-item active">
      <div class="conversation-avatar">B</div>
      <div class="conversation-info"></div>
      <div class="conversation-top">
        <span class="conversation-name">Bob</span>
        <span class="conversation-time">11:11 AM</span>
      </div>
      <div class="conversation-preview">Hi,my name is Bob.</div>
    </div>

  <!--Second conversation Example-->
  <div class="conversation-item"></div>
  <div class="conversation-avatar">E</div>
  <div class="conversation-info">
    <div class="conversation-top">
      <span class="conversation-name">Emerson</span>
      <span class="conversation-time">Yesterday</span>
    </div>
    <div class="conversation-preview">hey bro,did you see my charger anywhere></div>
   </div>
  </div>
</aside>
  
<!--Main chat area-->
<main class="chat-main"></main>
    <!-- Empty state -->
    <div id="empty-state" class="empty-state d-none">
      <div class="text-center">
        <div style="font-size:3rem">💬</div>
        <p class="mt-2">Select a conversation to start chatting</p>
      </div>
    </div>

    <!-- Chat panel (hidden until a conversation is selected) -->
    <div id="chat-panel" class="chat-main">
      <div class="chat-header" id="chat-title">Chat</div>
      <div class="chat-user-info"></div>
      <div class="chat-user-avatar">B</div>
      <div>
        <div class="chat-title" id="chat-title">Bob</div>
        <div class="chat-status">Online</div>
      </div>
      <div class="chat-header-sections">
        <button type="button" class="chat-action-btn" title="Search">🔎</button>
        <button type="button" class="chat-action-btn" title="More options">&#8942</button>
      </div>
      </div>

      <div id="messages" class="messages"></div>
      <div class="message-row resceived">
        <div class="message-bubble"></div>
        <div class="message-meta"></div>
        <div class="message-reactions"></div>
        <span class="reaction-pill">😋</span>
        <span class="reaction-pill">🦕</span>
      </div>
      <div class="message-row sent">
        <div class="message-bubble">Where is Bob?</div>
        <div class="message-meta">11:11 AM</div>
        <div class="message-reactions">
          <span class="reaction-pill">💗</span>
        </div>
      </div>
      
      <div id="typing-indicator" class="message-row received"></div>
      <div id="messages"></div>
      <form class="message-bar" id="message-form">
        <button type="button" class="input-icon-btn" title="Emoji">🤨</button>
        <textarea id="message-input" placeholder="Type a message…" rows="1"></textarea>
        <button type="submit" class="send-btn">&#10148;</button>
      </form>
    </div>

  </div>

  <!-- New Chat Modal -->
  <div class="modal fade" id="newChatModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="fw-bold mb-0">New message</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <input id="dm-username" type="text" class="form-control mb-2" placeholder="Search by username" />
        <p id="dm-error" class="text-danger small mb-2"></p>
        <button id="start-dm-btn" class="btn w-100 text-white" style="background:var(--primary)">Start chat</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
