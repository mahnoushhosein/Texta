<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#075E54" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Chats — Texta</title>
</head>
<body>

  <nav class="navbar navbar-dark bg-primary-app px-3">
    <a href="chat.html" class="navbar-brand">Texta</a>
    <div class="d-flex gap-3">
      <a href="profile.html" class="text-white text-decoration-none small">Profile</a>
      <button id="signout-btn" class="btn btn-sm btn-outline-light">Sign out</button>
    </div>
  </nav>

  <div class="chat-layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="fw-semibold">Messages</span>
        <button class="btn-new" data-bs-toggle="modal" data-bs-target="#newChatModal" title="New message">+</button>
      </div>
      <div id="conversation-list"></div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="chat-main">
      <div class="text-center">
        <div style="font-size:3rem">💬</div>
        <p class="mt-2">Select a conversation to start chatting</p>
      </div>
    </div>

    <!-- Chat panel (hidden until a conversation is selected) -->
    <div id="chat-panel" class="chat-main d-none">
      <div class="chat-header" id="chat-title">Chat</div>
      <div id="messages"></div>
      <form class="message-bar" id="message-form">
        <textarea id="message-input" placeholder="Type a message…" rows="1"></textarea>
        <button type="submit" class="send-btn">&#10148;</button>
      </form>
    </div>

  </div>

  <!-- New Chat Modal -->
  <div class="modal fade" id="newChatModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="fw-bold mb-0">New message</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <input id="dm-username" type="text" class="form-control mb-2" placeholder="Search by username" />
        <p id="dm-error" class="text-danger small mb-2"></p>
        <button id="start-dm-btn" class="btn w-100 text-white" style="background:var(--primary)">Start chat</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
