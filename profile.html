<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#075E54" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Profile — Texta</title>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary-app px-3">
    <a href="chat.html" class="navbar-brand">Texta</a>
    <button id="signout-btn" class="btn btn-sm btn-outline-light">Sign out</button>
  </nav>

  <div class="profile-card card shadow p-4 mx-3">
    <h4 class="fw-bold mb-4" style="color:var(--primary)">Your Profile</h4>
    <form id="profile-form">
      <div class="mb-3">
        <label class="form-label fw-medium">Username</label>
        <input id="username" type="text" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label fw-medium">Status</label>
        <input id="status" type="text" class="form-control" maxlength="100" placeholder="Hey there! I am using Texta." />
      </div>
      <p id="save-msg" class="small mb-2"></p>
      <button id="save-btn" type="submit" class="btn w-100 text-white fw-semibold" style="background:var(--primary)">
        Save changes
      </button>
    </form>
    <hr class="my-4" />
    <button id="signout-btn" class="btn w-100 btn-outline-danger">Sign out</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
